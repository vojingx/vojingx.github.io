<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>403 错误</title>
<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "微软雅黑", sans-serif;
}
body{
    background-color: #eeeeee;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.error-box{
    width: 420px;
    background: #dd2222;
    color: #fff;
    padding: 40px 20px;
    border-radius: 6px;
    text-align: center;
}
h1{
    font-size: 68px;
}
.tips{
    font-size: 16px;
    margin: 10px 0 35px;
}
.back-btn{
    text-decoration: none;
    padding: 11px 32px;
    background: #ffffff;
    color: #dd2222;
    border-radius: 4px;
    font-size: 15px;
    font-weight: bold;
}
.back-btn:hover{
    background: #f0f0f0;
}
</style>
</head>
<body>
<div class="error-box">
    <h1>403</h1>
    <p class="tips">网页403错误</p>
    <a href="../index.html" class="back-btn">返回首页</a>
</div>

</html>
