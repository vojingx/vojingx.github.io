{% extends "base.html" %}
{% block title %}注册 - Vojing Cloud{% endblock %}
{% block content %}
<div class="auth-box">
    <h2>注册 Vojing Cloud</h2>
    <form method="post" action="{{ url_for('register') }}" onsubmit="return checkForm()">
        <div class="form-row">
            <label>用户名</label>
            <input type="text" name="username" required autocomplete="username">
        </div>
        <div class="form-row">
            <label>密码</label>
            <input type="password" id="pwd" name="password" required autocomplete="new-password">
        </div>
        <div class="form-row">
            <label>确认密码</label>
            <input type="password" id="pwd2" required autocomplete="new-password">
        </div>
        <button type="submit" class="primary-btn">注册</button>
    </form>
    <p class="auth-tip">已有账号？<a href="{{ url_for('login') }}">直接登录</a></p>
</div>
<script>
function checkForm(){
    const p1 = document.getElementById('pwd').value;
    const p2 = document.getElementById('pwd2').value;
    if(p1 !== p2){
        alert('两次输入的密码不一致');
        return false;
    }
    return true;
}
</script>
{% endblock %}
